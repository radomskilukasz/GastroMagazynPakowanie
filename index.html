<!DOCTYPE html>
<html lang="pl">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="logo-removebg-preview.png">
  <link rel="icon" type="image/png" sizes="16x16" href="logo-removebg-preview.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pakowanie Toreb</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --green:#16a34a;
      --red:#dc2626;
      --orange:#f59e0b;
      --shadow:0 10px 35px rgba(0,0,0,.08);
    }

    * { box-sizing:border-box; }

    body {
      font-family:Arial, sans-serif;
      padding:20px;
      margin:0;
      background:var(--bg);
      color:var(--text);
    }

    button {
      font-size:18px;
      padding:8px 12px;
      margin:5px;
      cursor:pointer;
      border-radius:12px;
      border:none;
      font-weight:bold;
      position:relative;
      z-index:2;
    }

    button:disabled {
      opacity:.6;
      cursor:not-allowed;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      font-size:17px;
    }

    th, td {
      border:1px solid #ddd;
      padding:10px;
      text-align:left;
    }

    th { background:#e5e7eb; }
    tr.done { background:#dcfce7; }
    tr.missing { background:white; }
    tr.brakiRow { background:#fffbeb; }

    .ok { color:green; }
    .bad { color:red; }
    .warn { color:orange; }
    .hidden { display:none !important; }

    .loginLogo {
      text-align:center;
      margin-bottom:15px;
    }

    .loginLogo img {
      width:90px;
      height:auto;
      display:block;
      margin:0 auto;
    }

    .loginCard,
    .bagCard,
    .trayCard {
      background:white;
      padding:36px;
      border-radius:24px;
      width:100%;
      margin:40px auto;
      box-shadow:var(--shadow);
      box-sizing:border-box;
    }

    .loginCard { max-width:520px; }
    .bagCard { max-width:620px; }
    .trayCard { max-width:1000px; }

    .loginCard h1,
    .bagCard h1 {
      text-align:center;
      margin:0;
      font-size:32px;
    }

    .bagCard h1 { font-size:34px; }

    .loginSubtitle,
    .bagSubtitle {
      text-align:center;
      color:var(--muted);
      margin-top:8px;
      margin-bottom:28px;
    }

    .loginCard label {
      display:block;
      font-weight:bold;
      margin-top:16px;
      margin-bottom:6px;
    }

    .loginInput {
      width:100%;
      font-size:22px;
      padding:14px;
      border-radius:12px;
      border:2px solid #d1d5db;
      margin:0;
    }

    .loginInput:focus {
      outline:none;
      border-color:var(--blue);
    }

    .loginBtn {
      width:100%;
      margin:24px 0 0;
      font-size:24px;
      padding:16px;
      border-radius:14px;
      border:none;
      background:var(--blue);
      color:white;
      font-weight:bold;
    }

    .loginBtn:hover { background:var(--blue-dark); }

    .loginStatus {
      margin-top:18px;
      padding:12px;
      border-radius:12px;
      font-weight:bold;
      display:none;
      line-height:1.35;
    }

    .loginStatus.error {
      display:block;
      background:#fee2e2;
      color:#991b1b;
    }

    .loginStatus.ok {
      display:block;
      background:#dcfce7;
      color:#166534;
    }

    .bagInput {
      width:100%;
      font-size:30px;
      padding:18px;
      border-radius:14px;
      border:3px solid var(--blue);
      margin:0;
      text-align:center;
      font-weight:bold;
      letter-spacing:1px;
    }

    .bagInput:focus {
      outline:none;
      border-color:var(--blue-dark);
      box-shadow:0 0 0 4px rgba(37,99,235,.15);
    }

    .bagStatus {
      margin-top:20px;
      text-align:center;
      font-size:24px;
      font-weight:bold;
      min-height:34px;
      line-height:1.35;
    }

    .trayTitle {
      text-align:center;
      font-size:34px;
      margin:0 0 24px;
    }

    .trayIcon {
      width:46px;
      height:auto;
      vertical-align:middle;
      margin-left:10px;
    }

    .trayHeaderBox {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      background:#f9fafb;
      border:1px solid var(--border);
      padding:22px;
      border-radius:18px;
      margin-bottom:18px;
    }

    .resumeBanner {
      background:#fffbeb;
      border:2px solid #fde68a;
      color:#92400e;
      border-radius:18px;
      padding:16px 18px;
      font-size:20px;
      font-weight:bold;
      line-height:1.4;
      margin-bottom:18px;
    }

    .traySmallLabel {
      color:var(--muted);
      font-size:16px;
      font-weight:bold;
      margin-bottom:6px;
    }

    .bagCodeBig {
      font-size:32px;
      font-weight:bold;
      word-break:break-word;
    }

    .expectedProgressBig {
      font-size:34px;
      font-weight:bold;
      color:var(--blue);
    }

    .trayInputNew {
      width:100%;
      font-size:32px;
      padding:18px;
      border-radius:14px;
      border:3px solid var(--blue);
      margin:0 0 16px;
      text-align:center;
      font-weight:bold;
      letter-spacing:1px;
    }

    .trayInputNew:focus {
      outline:none;
      border-color:var(--blue-dark);
      box-shadow:0 0 0 4px rgba(37,99,235,.15);
    }

    .actionButtons {
      display:flex;
      gap:12px;
      margin:10px 0 14px;
      position:relative;
      z-index:1;
    }

    .cancelBtn {
      flex:1;
      font-size:20px;
      padding:16px;
      border-radius:14px;
      border:none;
      background:#e5e7eb;
      color:#111827;
      font-weight:bold;
      margin:0;
    }

    .cancelBtn:hover { background:#d1d5db; }

    .brakiBtn {
      flex:1.4;
      width:100%;
      font-size:21px;
      padding:16px;
      margin:0;
      background:#f59e0b;
      color:white;
      border:none;
      border-radius:14px;
      font-weight:bold;
    }

    .brakiBtn:hover { background:#d97706; }

    .fullBtn {
      flex:1.6;
      width:100%;
      font-size:21px;
      padding:16px;
      margin:0;
      background:#ef4444;
      color:white;
      border:none;
      border-radius:14px;
      font-weight:bold;
    }

    .fullBtn:hover { background:#dc2626; }

    .trayStatus {
      margin-top:18px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
      min-height:38px;
      line-height:1.3;
    }

    .expectedTable table { font-size:28px; }

    .expectedTable th {
      text-align:center;
      font-size:24px;
      padding:18px;
    }

    .expectedTable td {
      text-align:center;
      font-size:32px;
      font-weight:bold;
      padding:22px;
    }

    .mealClick {
      cursor:pointer;
      font-weight:bold;
      text-decoration:underline;
      text-underline-offset:4px;
    }

    .mealClick:hover { opacity:.7; }

    .problemsTitle {
      text-align:center;
      font-size:36px;
      margin-top:34px;
      margin-bottom:24px;
    }

    .problemsGrid {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:16px;
    }

    .problemBox {
      border:1px solid #d1d5db;
      border-radius:10px;
      overflow:hidden;
      min-height:150px;
      background:white;
      text-align:center;
      font-size:24px;
    }

    .problemBoxHeader {
      background:#e5e7eb;
      padding:14px;
      font-weight:bold;
    }

    .problemBoxHeader.braki {
      background:#fef3c7;
      color:#92400e;
    }

    .problemBoxBody {
      padding:18px;
      line-height:1.45;
      word-break:break-word;
    }

    .problemBox button {
      font-size:16px;
      padding:6px 12px;
      margin-left:8px;
      background:#e5e7eb;
      color:#111827;
    }

    .modalBg {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
      padding:14px;
    }

    .modal {
      background:white;
      padding:28px;
      border-radius:18px;
      width:90%;
      max-width:680px;
      max-height:90vh;
      overflow:auto;
    }

    .modalBtn {
      width:100%;
      font-size:22px;
      padding:15px;
      margin:8px 0;
      border-radius:10px;
    }

    .btnCancel {
      background:#e5e7eb;
      color:#111827;
    }

    .btnReplace {
      background:#f97316;
      color:white;
    }

    .btnAnother {
      background:var(--blue);
      color:white;
    }

    @media(max-width:800px){
      body { padding:12px; }

      .loginCard,
      .bagCard,
      .trayCard {
        padding:24px;
        margin:20px auto;
      }

      .trayHeaderBox {
        flex-direction:column;
        align-items:flex-start;
      }

      .actionButtons {
        flex-direction:column;
      }

      .cancelBtn,
      .brakiBtn,
      .fullBtn {
        width:100%;
      }

      .problemsGrid {
        grid-template-columns:1fr;
      }

      .expectedTable table {
        font-size:20px;
      }

      .expectedTable th {
        font-size:18px;
        padding:12px;
      }

      .expectedTable td {
        font-size:22px;
        padding:14px;
      }
    }
  </style>
</head>

<body>

<div class="loginCard" id="loginScreen">
  <div class="loginLogo">
    <img src="logo.png" alt="logo">
  </div>

  <h1>Pakowanie Toreb</h1>
  <p class="loginSubtitle">Zaloguj się, aby rozpocząć skanowanie</p>

  <label>Login pracownika</label>
  <input id="email" class="loginInput" placeholder="np. JanKowalski" autocomplete="username">

  <label>Hasło</label>
  <input id="password" class="loginInput" type="password" placeholder="Wpisz hasło" autocomplete="current-password">

  <button id="loginBtn" type="button" class="loginBtn" onclick="login()">Zaloguj</button>

  <p id="loginStatus" class="loginStatus"></p>
</div>

<div class="bagCard hidden" id="bagScreen">
  <div class="loginLogo">
    <img src="logo.png" alt="logo">
  </div>

  <h1>Zeskanuj torbę</h1>
  <p class="bagSubtitle">Zeskanuj kod QR torby, aby rozpocząć pakowanie</p>

  <input id="bagInput" class="bagInput" placeholder="Zeskanuj kod torby" autocomplete="off">

  <p id="bagStatus" class="bagStatus"></p>
</div>

<div class="trayCard hidden" id="trayScreen">
  <div class="loginLogo">
    <img src="logo.png" alt="logo">
  </div>

  <h1 class="trayTitle">
    Skanowanie tacek
    <img src="tacka.png" class="trayIcon" alt="tacka">
  </h1>

  <div id="resumeBanner" class="resumeBanner hidden"></div>

  <div class="trayHeaderBox">
    <div>
      <div class="traySmallLabel">Aktualna torba</div>
      <div class="bagCodeBig" id="currentBagLabel"></div>
    </div>

    <div>
      <div class="traySmallLabel">Postęp</div>
      <div class="expectedProgressBig">
        <span id="expectedProgress">0/0</span>
      </div>
    </div>
  </div>

  <input id="trayInput" class="trayInputNew" placeholder="Zeskanuj kod tacki" autocomplete="off">

  <div class="actionButtons">
    <button type="button" class="cancelBtn" onclick="event.preventDefault(); event.stopPropagation(); reset()">↩️ Anuluj</button>
    <button type="button" id="brakiCloseBtn" class="brakiBtn" onclick="event.preventDefault(); event.stopPropagation(); closeBagBraki()">🟡 BRAKI / do dopakowania</button>
    <button type="button" id="badCloseBtn" class="fullBtn" onclick="event.preventDefault(); event.stopPropagation(); closeBagBad()">❌ Zamknij jako niepoprawną</button>
  </div>

  <p id="status" class="trayStatus"></p>

  <div id="expectedList" class="expectedTable"></div>

  <h2 class="problemsTitle">Problemy</h2>
  <div id="problems"></div>
</div>

<div id="duplicateBagModal" class="modalBg hidden">
  <div class="modal">
    <h2 id="duplicateBagTitle">⚠️ Torba była już pakowana</h2>
    <p id="duplicateBagInfo"></p>

    <button type="button" class="modalBtn btnCancel" onclick="event.preventDefault(); event.stopPropagation(); cancelDuplicateBag()">Anuluj i wróć do skanowania toreb</button>
    <button type="button" class="modalBtn btnReplace" onclick="event.preventDefault(); event.stopPropagation(); replaceOldBagSession()">Pakuj ponownie i usuń ostatni zapis</button>
    <button type="button" class="modalBtn btnAnother" onclick="event.preventDefault(); event.stopPropagation(); packAnotherSameBag()">Pakuj kolejną z tym samym kodem</button>
  </div>
</div>

<div id="mealModal" class="modalBg hidden">
  <div class="modal">
    <h2>Szczegóły posiłku</h2>
    <p id="mealDetails"></p>
    <button type="button" class="modalBtn btnCancel" onclick="event.preventDefault(); event.stopPropagation(); closeMealDetails()">Zamknij</button>
  </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://lanmmbpqxmenyjwvwpkt.supabase.co",
  "sb_publishable_sYrinkI1u2zr9uXZwsERNg_HE0wQKsC"
);

const LOGIN_DOMAIN = "@pakowanie.local";

let currentUser = null;
let currentBag = null;
let expectedItems = [];
let correctScans = [];
let wrong = [];
let duplicates = [];
let allScans = [];
let startedAt = null;
let isClosing = false;

let pendingBag = null;
let pendingBagData = [];
let existingBagSessions = [];

let resumedSessionId = null;
let resumedFromBraki = false;

let audioCtx = null;
let logoutTimer = null;

function makeUuid() {
  if (window.crypto && crypto.randomUUID) {
    return crypto.randomUUID();
  }

  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    const v = c === "x" ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

function normalizeCode(value) {
  return String(value || "")
    .trim()
    .toUpperCase()
    .replace(/\s+/g, "")
    .replaceAll("Ś","S")
    .replaceAll("Ą","A")
    .replaceAll("Ć","C")
    .replaceAll("Ę","E")
    .replaceAll("Ł","L")
    .replaceAll("Ń","N")
    .replaceAll("Ó","O")
    .replaceAll("Ź","Z")
    .replaceAll("Ż","Z");
}

function normalizeStatus(statusValue) {
  const value = String(statusValue || "").toUpperCase().trim();
  if (value === "NIEPRAWIDŁOWA") return "NIEPOPRAWNA";
  if (value === "DO_DOPAKOWANIA" || value === "DO DOPAKOWANIA") return "BRAKI";
  return value;
}

function displayLogin(value) {
  return String(value || "").toLowerCase().replace(LOGIN_DOMAIN, "");
}

async function getUserRole(userId) {
  const { data, error } = await supabaseClient
    .from("user_roles")
    .select("role")
    .eq("user_id", userId)
    .single();

  if (error || !data) return null;
  return data.role;
}

function hasAccess(role, allowedRoles) {
  return allowedRoles.includes(role);
}

function showOnly(id) {
  ["loginScreen","bagScreen","trayScreen"].forEach(x => {
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

function sound(type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    if (type === "ok") playTone(900, 0.08, 0.08);
    if (type === "bad") playTone(180, 0.18, 1.25);
    if (type === "warn") playTone(450, 0.12, 0.18);
    if (type === "done") {
      playTone(1000, 0.09, 0.10);
      setTimeout(() => playTone(1300, 0.09, 0.12), 120);
    }
  } catch(e) {}
}

function playTone(freq, volume, duration) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  gain.gain.value = volume;
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function getLoginEmail(loginValue) {
  const value = String(loginValue || "").trim().toLowerCase();
  if (!value) return "";
  if (value.includes("@")) return value;
  return value + LOGIN_DOMAIN;
}

function translateLoginError(errorMessage) {
  const msg = String(errorMessage || "").toLowerCase();

  if (msg.includes("invalid login credentials")) return "Nieprawidłowy login lub hasło.";
  if (msg.includes("email not confirmed")) return "Konto nie zostało potwierdzone. Sprawdź użytkownika w Supabase.";
  if (msg.includes("user not found")) return "Nieznany użytkownik.";
  if (msg.includes("invalid email")) return "Nieprawidłowy login.";
  if (msg.includes("network") || msg.includes("failed to fetch")) return "Brak połączenia z internetem lub bazą danych.";

  return "Nie udało się zalogować. Sprawdź login i hasło.";
}

function showLoginMessage(text, type = "error") {
  loginStatus.innerText = text;
  loginStatus.className = "loginStatus " + type;
}

function focusBagInput() {
  setTimeout(() => {
    bagInput.focus();
    bagInput.click();
  }, 50);

  setTimeout(() => {
    bagInput.focus();
  }, 300);
}

function focusTrayInput() {
  setTimeout(() => {
    trayInput.focus();
    trayInput.click();
  }, 50);

  setTimeout(() => {
    trayInput.focus();
  }, 300);
}

function startLogoutTimer() {
  if (logoutTimer) clearTimeout(logoutTimer);

  logoutTimer = setTimeout(() => {
    autoLogout();
  }, 8 * 60 * 60 * 1000);
}

async function autoLogout() {
  try {
    await supabaseClient.auth.signOut();
  } catch(e) {}

  if (logoutTimer) {
    clearTimeout(logoutTimer);
    logoutTimer = null;
  }

  clearPackingState();

  currentUser = null;

  showOnly("loginScreen");

  loginStatus.innerText = "Sesja wygasła po 8 godzinach pracy. Zaloguj się ponownie.";
  loginStatus.className = "loginStatus error";

  setTimeout(() => email.focus(), 100);
}

email.addEventListener("keydown", e => {
  if (e.key === "Enter") password.focus();
});

password.addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

bagInput.addEventListener("keydown", e => {
  if (e.key === "Enter") loadBag();
});

trayInput.addEventListener("keydown", e => {
  if (e.key === "Enter") scanTray();
});

document.addEventListener("click", event => {
  if (event.target.closest("button")) return;

  setTimeout(() => {
    if (!bagScreen.classList.contains("hidden")) bagInput.focus();
    if (!trayScreen.classList.contains("hidden")) trayInput.focus();
  }, 50);
});

async function login() {
  const loginValue = email.value.trim();
  const passwordValue = password.value;
  const emailValue = getLoginEmail(loginValue);

  loginStatus.className = "loginStatus";
  loginStatus.innerText = "";

  if (!loginValue) {
    showLoginMessage("Wpisz login pracownika.");
    sound("bad");
    email.focus();
    return;
  }

  if (!passwordValue) {
    showLoginMessage("Wpisz hasło.");
    sound("bad");
    password.focus();
    return;
  }

  loginBtn.disabled = true;
  loginBtn.innerText = "Loguję...";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: emailValue,
    password: passwordValue
  });

  loginBtn.disabled = false;
  loginBtn.innerText = "Zaloguj";

  if (error) {
    showLoginMessage(translateLoginError(error.message));
    sound("bad");
    return;
  }

  currentUser = data.user;
  startLogoutTimer();

  const role = await getUserRole(currentUser.id);

  if (!hasAccess(role, ["worker", "manager", "admin"])) {
    showLoginMessage("Brak dostępu do pakowania.");
    sound("bad");
    return;
  }

  showLoginMessage("Zalogowano pomyślnie.", "ok");
  sound("ok");

  setTimeout(() => {
    showOnly("bagScreen");
    focusBagInput();
  }, 400);
}

async function getBagSessionsForPacking(bag) {
  let rows = [];

  const { data: rpcRows, error: rpcError } = await supabaseClient
    .rpc("get_bag_sessions_for_packing", {
      target_bag: bag
    });

  if (rpcError) {
    throw rpcError;
  }

  rows = rpcRows || [];

  try {
    const { data: directRows, error: directError } = await supabaseClient
      .from("packing_sessions")
      .select("id, status, user_login, closed_at, started_at, all_scans, missing_trays")
      .eq("bag_qr", bag)
      .order("closed_at", { ascending:false })
      .limit(20);

    if (!directError && directRows && directRows.length) {
      rows = directRows;
    }
  } catch(e) {}

  return rows;
}

async function loadBag() {
  const bag = bagInput.value.trim();
  if (!bag) return;

  bagStatus.innerText = "Sprawdzam torbę...";

  const { data, error } = await supabaseClient
    .from("packing_plan")
    .select("id, bag_qr, tray_qr, meal, code, size, dish_name")
    .eq("bag_qr", bag)
    .order("id", { ascending:true });

  if (error || !data || !data.length) {
    bagStatus.innerText = "❌ Brak torby";
    bagInput.value = "";
    bagInput.focus();
    sound("bad");
    return;
  }

  let sessions = [];

  try {
    sessions = await getBagSessionsForPacking(bag);
  } catch(sessionError) {
    bagStatus.innerText = "❌ Błąd sprawdzania historii torby: " + sessionError.message;
    sound("bad");
    return;
  }

  if (sessions && sessions.length > 0) {
    const last = sessions[0];
    const lastStatus = normalizeStatus(last.status);

    if (lastStatus === "BRAKI") {
      bagStatus.innerText = "🟡 Otwieram torbę z braków...";
      await resumeBrakiAutomatically(bag, data, last);
      return;
    }

    pendingBag = bag;
    pendingBagData = data;
    existingBagSessions = sessions;

    duplicateBagTitle.innerText = "⚠️ Torba była już pakowana";

    duplicateBagInfo.innerHTML = `
      Kod torby: <b>${escapeHtml(bag)}</b><br><br>
      Ostatni zapis:<br>
      Status: <b>${escapeHtml(lastStatus || "-")}</b><br>
      Pracownik: <b>${escapeHtml(displayLogin(last.user_login || "-"))}</b><br>
      Zamknięto: <b>${last.closed_at ? escapeHtml(new Date(last.closed_at).toLocaleString("pl-PL")) : "-"}</b><br><br>
      Liczba wcześniejszych zapisów tej torby: <b>${sessions.length}</b><br><br>
      Opcja „Pakuj ponownie” usuwa ostatni zapis tej torby.
    `;

    duplicateBagModal.classList.remove("hidden");
    bagStatus.innerText = "";
    sound("warn");
    return;
  }

  startBagPacking(bag, data);
}

async function resumeBrakiAutomatically(bag, bagData, lastSession) {
  let preloadedCorrectScans = [];

  if (lastSession.id) {
    try {
      const { data, error } = await supabaseClient.rpc("get_report_session_details", {
        target_session_id: lastSession.id
      });

      if (!error && data && data.length) {
        preloadedCorrectScans = buildCorrectScansFromDetails(data, bagData);
      }
    } catch(e) {}
  }

  if (!preloadedCorrectScans.length && lastSession.all_scans) {
    preloadedCorrectScans = buildCorrectScansFromText(lastSession.all_scans, bagData);
  }

  startBagPacking(bag, bagData, {
    resumedSessionId: lastSession.id || null,
    resumedFromBraki: true,
    preloadedCorrectScans
  });
}

function buildCorrectScansFromDetails(details, bagData) {
  const scans = [];
  const usedIds = new Set();

  details
    .filter(row => String(row.item_status || "").toLowerCase() === "ok")
    .forEach(row => {
      const item = bagData.find(x => {
        if (usedIds.has(Number(x.id))) return false;

        return (
          Number(x.id) === Number(row.plan_item_id) ||
          normalizeCode(x.tray_qr) === normalizeCode(row.tray_qr) ||
          normalizeCode(x.tray_qr) === normalizeCode(row.scanned_tray_qr)
        );
      });

      if (!item) return;

      usedIds.add(Number(item.id));

      scans.push({
        plan_item_id: item.id,
        tray_qr: row.scanned_tray_qr || item.tray_qr,
        expected_tray_qr: item.tray_qr,
        scanned_at: row.scanned_at || new Date().toISOString(),
        restored: true
      });
    });

  return scans;
}

function buildCorrectScansFromText(text, bagData) {
  const scans = [];
  const usedIds = new Set();
  const values = String(text || "")
    .split("|")
    .map(x => x.trim())
    .filter(Boolean);

  values.forEach(value => {
    const item = bagData.find(x =>
      !usedIds.has(Number(x.id)) &&
      normalizeCode(x.tray_qr) === normalizeCode(value)
    );

    if (!item) return;

    usedIds.add(Number(item.id));

    scans.push({
      plan_item_id: item.id,
      tray_qr: value,
      expected_tray_qr: item.tray_qr,
      scanned_at: new Date().toISOString(),
      restored: true
    });
  });

  return scans;
}

function startBagPacking(bag, data, options = {}) {
  currentBag = bag;
  expectedItems = (data || []).map(x => ({
    id: x.id,
    bag_qr: x.bag_qr,
    tray_qr: x.tray_qr,
    meal: x.meal,
    code: x.code,
    size: x.size,
    dish_name: x.dish_name
  }));

  correctScans = [];
  wrong = [];
  duplicates = [];
  allScans = [];
  startedAt = new Date();
  isClosing = false;
  resumedSessionId = options.resumedSessionId || null;
  resumedFromBraki = !!options.resumedFromBraki;

  if (Array.isArray(options.preloadedCorrectScans)) {
    correctScans = options.preloadedCorrectScans;
    allScans = correctScans
      .map(x => x.tray_qr)
      .filter(Boolean);
  }

  currentBagLabel.innerText = bag;
  bagInput.value = "";
  bagStatus.innerText = "";
  status.innerText = resumedFromBraki
    ? "Dopakuj brakujące tacki"
    : "Skanuj tacki";
  status.className = resumedFromBraki ? "trayStatus warn" : "trayStatus";

  badCloseBtn.disabled = false;
  brakiCloseBtn.disabled = false;

  if (resumedFromBraki) {
    resumeBanner.classList.remove("hidden");
    resumeBanner.innerText =
      "🟡 Tryb dopakowania BRAKI. Poprawnie spakowane wcześniej tacki są już zaznaczone. Zeskanuj tylko brakujące pozycje.";
  } else {
    resumeBanner.classList.add("hidden");
    resumeBanner.innerText = "";
  }

  showOnly("trayScreen");
  render();
  sound(resumedFromBraki ? "warn" : "ok");
  focusTrayInput();
}

function cancelDuplicateBag() {
  pendingBag = null;
  pendingBagData = [];
  existingBagSessions = [];

  duplicateBagModal.classList.add("hidden");
  bagInput.value = "";
  bagStatus.innerText = "";
  showOnly("bagScreen");
  focusBagInput();
}

async function replaceOldBagSession() {
  if (!pendingBag) return;

  duplicateBagModal.classList.add("hidden");
  bagStatus.innerText = "Usuwam ostatni zapis tej torby...";

  const { error } = await supabaseClient
    .rpc("delete_bag_sessions_for_repack", {
      target_bag: pendingBag
    });

  if (error) {
    bagStatus.innerText = "❌ Nie udało się usunąć ostatniego zapisu: " + error.message;
    sound("bad");
    return;
  }

  const bag = pendingBag;
  const bagData = pendingBagData;

  pendingBag = null;
  pendingBagData = [];
  existingBagSessions = [];

  startBagPacking(bag, bagData);
}

function packAnotherSameBag() {
  if (!pendingBag) return;

  duplicateBagModal.classList.add("hidden");

  const bag = pendingBag;
  const data = pendingBagData;

  pendingBag = null;
  pendingBagData = [];
  existingBagSessions = [];

  startBagPacking(bag, data);
}

function getCorrectItemIds() {
  return correctScans.map(x => Number(x.plan_item_id));
}

function getCorrectCount() {
  return correctScans.length;
}

function getMissing() {
  const doneIds = getCorrectItemIds();
  return expectedItems.filter(x => !doneIds.includes(Number(x.id)));
}

function findNextExpectedItemForScan(scannedValue) {
  const normalized = normalizeCode(scannedValue);
  const doneIds = getCorrectItemIds();

  return expectedItems.find(item =>
    normalizeCode(item.tray_qr) === normalized &&
    !doneIds.includes(Number(item.id))
  );
}

function expectedContainsQr(scannedValue) {
  const normalized = normalizeCode(scannedValue);
  return expectedItems.some(item => normalizeCode(item.tray_qr) === normalized);
}

function showMealDetails(index) {
  const item = expectedItems[index];
  if (!item) return;

  const isDone = getCorrectItemIds().includes(Number(item.id));

  mealDetails.innerHTML = `
    <b>Status:</b> ${isDone ? "✅ Spakowane" : "🟡 Brakujące / do spakowania"}<br>
    <b>Posiłek:</b> ${escapeHtml(item.meal || "-")}<br>
    <b>Kod:</b> ${escapeHtml(item.code || "-")}<br>
    <b>Rozmiar:</b> ${escapeHtml(item.size || "-")}<br>
    <b>QR tacki:</b> ${escapeHtml(item.tray_qr || "-")}<br><br>
    <b>Nazwa dania:</b><br>
    ${escapeHtml(item.dish_name || "-")}
  `;

  mealModal.classList.remove("hidden");
}

function closeMealDetails() {
  mealModal.classList.add("hidden");
}

function render() {
  const doneIds = getCorrectItemIds();
  const missing = getMissing();

  expectedProgress.innerText = getCorrectCount() + "/" + expectedItems.length;

  expectedList.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Status</th>
          <th>Posiłek</th>
          <th>Kod</th>
          <th>Rozmiar</th>
        </tr>
      </thead>
      <tbody>
        ${expectedItems.map((i, index) => {
          const done = doneIds.includes(Number(i.id));
          return `
            <tr class="${done ? "done" : resumedFromBraki ? "brakiRow" : "missing"}">
              <td>${done ? "✅" : "🟡"}</td>
              <td>
                <span class="mealClick" onclick="showMealDetails(${index})">
                  ${escapeHtml(i.meal || "")}
                </span>
              </td>
              <td>${escapeHtml(i.code || "")}</td>
              <td>${escapeHtml(i.size || "")}</td>
            </tr>
          `;
        }).join("")}
      </tbody>
    </table>
  `;

  problems.innerHTML = `
    <div class="problemsGrid">

      <div class="problemBox">
        <div class="problemBoxHeader braki">Brakujące / do dopakowania:</div>
        <div class="problemBoxBody">
          ${missing.length ? missing.map(x => escapeHtml(x.tray_qr)).join("<br>") : "-"}
        </div>
      </div>

      <div class="problemBox">
        <div class="problemBoxHeader">Błędne:</div>
        <div class="problemBoxBody">
          ${wrong.length ? wrong.map((x, i) => `
            <div>
              ${escapeHtml(x)}
              <button type="button" onclick="event.preventDefault(); event.stopPropagation(); removeWrong(${i})">Usuń</button>
            </div>
          `).join("") : "-"}
        </div>
      </div>

      <div class="problemBox">
        <div class="problemBoxHeader">Duplikaty:</div>
        <div class="problemBoxBody">
          ${duplicates.length ? duplicates.map((x, i) => `
            <div>
              ${escapeHtml(x)}
              <button type="button" onclick="event.preventDefault(); event.stopPropagation(); removeDuplicate(${i})">Usuń</button>
            </div>
          `).join("") : "-"}
        </div>
      </div>

    </div>
  `;
}

async function scanTray() {
  const val = trayInput.value.trim();
  if (!val || isClosing) return;

  const matchingItem = findNextExpectedItemForScan(val);
  const scannedAt = new Date().toISOString();

  allScans.push(val);

  if (!matchingItem) {
    if (expectedContainsQr(val)) {
      duplicates.push(val);
      status.innerText = "⚠️ Duplikat / nadmiarowa tacka: " + val;
      status.className = "trayStatus warn";
      trayInput.value = "";
      render();
      focusTrayInput();
      sound("bad");
      return;
    }

    wrong.push(val);
    status.innerText = "❌ Zła tacka: " + val;
    status.className = "trayStatus bad";
    trayInput.value = "";
    render();
    focusTrayInput();
    sound("bad");
    return;
  }

  correctScans.push({
    plan_item_id: matchingItem.id,
    tray_qr: val,
    expected_tray_qr: matchingItem.tray_qr,
    scanned_at: scannedAt,
    restored: false
  });

  status.innerText = "✅ OK: " + val;
  status.className = "trayStatus ok";

  trayInput.value = "";
  render();
  focusTrayInput();
  sound("ok");

  await checkAutoClose();
}

function removeFirstFromArrayByNormalizedValue(arr, value) {
  const normalized = normalizeCode(value);
  const index = arr.findIndex(x => normalizeCode(x) === normalized);
  if (index >= 0) arr.splice(index, 1);
}

function removeWrong(index) {
  const removed = wrong[index];
  wrong.splice(index, 1);
  removeFirstFromArrayByNormalizedValue(allScans, removed);

  status.innerText = "Usunięto błędną tackę: " + removed;
  status.className = "trayStatus warn";

  render();
  checkAutoClose();
}

function removeDuplicate(index) {
  const removed = duplicates[index];
  duplicates.splice(index, 1);
  removeFirstFromArrayByNormalizedValue(allScans, removed);

  status.innerText = "Usunięto duplikat: " + removed;
  status.className = "trayStatus warn";

  render();
  checkAutoClose();
}

async function checkAutoClose() {
  if (
    currentBag &&
    !isClosing &&
    getMissing().length === 0 &&
    wrong.length === 0 &&
    duplicates.length === 0
  ) {
    await closeBagCorrect();
  }
}

async function closeBagCorrect() {
  if (!currentBag || isClosing) return;

  isClosing = true;
  status.innerText = resumedFromBraki
    ? "🎉 BRAKI DOPAKOWANE — TORBA GOTOWA"
    : "🎉 TORBA GOTOWA";
  status.className = "trayStatus ok";
  sound("done");

  const saved = await save("POPRAWNA");
  if (!saved) return;

  setTimeout(reset, 800);
}

async function closeBagBraki() {
  if (!currentBag || isClosing) return;

  const missing = getMissing();

  if (wrong.length > 0 || duplicates.length > 0) {
    status.innerText =
      "❌ BRAKI można zamknąć tylko wtedy, gdy problemem są wyłącznie brakujące tacki. Usuń błędne/duplikaty albo zamknij torbę jako niepoprawną.";
    status.className = "trayStatus bad";
    sound("bad");
    focusTrayInput();
    return;
  }

  if (!missing.length) {
    await closeBagCorrect();
    return;
  }

  isClosing = true;
  brakiCloseBtn.disabled = true;
  badCloseBtn.disabled = true;

  status.innerText = "Zapisuję torbę jako BRAKI / do dopakowania...";
  status.className = "trayStatus warn";
  sound("warn");

  const saved = await save("BRAKI");

  if (!saved) {
    brakiCloseBtn.disabled = false;
    badCloseBtn.disabled = false;
    return;
  }

  reset();
}

async function closeBagBad() {
  if (!currentBag || isClosing) return;

  isClosing = true;
  badCloseBtn.disabled = true;
  brakiCloseBtn.disabled = true;

  status.innerText = "Zapisuję torbę jako niepoprawną...";
  status.className = "trayStatus warn";
  sound("warn");

  const saved = await save("NIEPOPRAWNA");

  if (!saved) {
    badCloseBtn.disabled = false;
    brakiCloseBtn.disabled = false;
    return;
  }

  reset();
}

function buildSessionPayload(st, closedAt, durationSeconds, sessionId) {
  const missing = getMissing();

  return {
    id: sessionId,
    bag_qr: currentBag,
    user_id: currentUser.id,
    user_login: currentUser.email,
    status: st,
    started_at: startedAt ? startedAt.toISOString() : new Date().toISOString(),
    closed_at: closedAt.toISOString(),
    expected_count: expectedItems.length,
    correct_count: getCorrectCount(),
    all_scans: allScans.join(" | ") || "-",
    missing_trays: missing.map(x => x.tray_qr).join(" | ") || "-",
    wrong_trays: wrong.join(" | ") || "-",
    duplicate_trays: duplicates.join(" | ") || "-",
    duration_seconds: durationSeconds
  };
}

function buildItemRows(sessionId, st, closedAt) {
  const correctById = new Map();

  correctScans.forEach(scan => {
    correctById.set(Number(scan.plan_item_id), scan);
  });

  const rows = [];

  expectedItems.forEach(item => {
    const correct = correctById.get(Number(item.id));

    if (correct) {
      rows.push({
        session_id: sessionId,
        plan_item_id: item.id,
        bag_qr: currentBag,
        tray_qr: item.tray_qr,
        meal: item.meal,
        code: item.code,
        size: item.size,
        dish_name: item.dish_name,
        item_status: "ok",
        scanned_tray_qr: correct.tray_qr,
        scanned_by: currentUser.id,
        scanned_by_email: currentUser.email,
        scanned_at: correct.scanned_at || closedAt.toISOString()
      });
      return;
    }

    if (st === "BRAKI") {
      rows.push({
        session_id: sessionId,
        plan_item_id: item.id,
        bag_qr: currentBag,
        tray_qr: item.tray_qr,
        meal: item.meal,
        code: item.code,
        size: item.size,
        dish_name: item.dish_name,
        item_status: "brak",
        missing_by: currentUser.id,
        missing_by_email: currentUser.email,
        missing_at: closedAt.toISOString()
      });
    }
  });

  return rows;
}

async function saveSessionRow(payload) {
  /*
    Jeżeli torba była otwarta z BRAKI, nie tworzymy drugiego wpisu.
    Aktualizujemy istniejący wpis BRAKI na POPRAWNA / BRAKI / NIEPOPRAWNA.
  */

  if (resumedSessionId) {
    const { data, error } = await supabaseClient.rpc("update_braki_packing_session", {
      p_session_id: resumedSessionId,
      p_bag_qr: payload.bag_qr,
      p_status: payload.status,
      p_started_at: payload.started_at,
      p_closed_at: payload.closed_at,
      p_expected_count: payload.expected_count,
      p_correct_count: payload.correct_count,
      p_all_scans: payload.all_scans,
      p_missing_trays: payload.missing_trays,
      p_wrong_trays: payload.wrong_trays,
      p_duplicate_trays: payload.duplicate_trays,
      p_duration_seconds: payload.duration_seconds
    });

    if (error) throw error;

    if (data !== "OK") {
      throw new Error(data || "Nie udało się zaktualizować wpisu BRAKI.");
    }

    return resumedSessionId;
  }

  const { error } = await supabaseClient
    .from("packing_sessions")
    .insert(payload);

  if (error) throw error;

  return payload.id;
}
async function saveSessionItems(sessionId, rows) {
  /*
    Szczegóły pozycji są dodatkiem.
    Nie mogą blokować zamknięcia torby.
  */

  try {
    await supabaseClient
      .from("packing_session_items")
      .delete()
      .eq("session_id", sessionId);

    if (!rows.length) return;

    const { error } = await supabaseClient
      .from("packing_session_items")
      .insert(rows);

    if (error) {
      console.warn("Nie zapisano szczegółów pozycji:", error.message);
    }
  } catch(e) {
    console.warn("Nie zapisano szczegółów pozycji:", e.message);
  }
}

async function save(st) {
  const closedAt = new Date();
  const durationSeconds = startedAt ? Math.round((closedAt - startedAt) / 1000) : null;

  /*
    Przy normalnej torbie tworzymy nowe ID.
    Przy torbie otwartej z BRAKI używamy starego ID, żeby nie powstał drugi status tej samej torby.
  */
  const sessionId = resumedSessionId || makeUuid();

  const payload = buildSessionPayload(st, closedAt, durationSeconds, sessionId);

  try {
    await saveSessionRow(payload);

    let itemRows = [];
    try {
      itemRows = buildItemRows(sessionId, st, closedAt);
    } catch(e) {
      console.warn("Nie zbudowano szczegółów pozycji:", e.message);
      itemRows = [];
    }

    await saveSessionItems(sessionId, itemRows);

    resumedSessionId = sessionId;

    return true;

  } catch(error) {
    status.innerText = "❌ Nie zapisano wyniku. Nie skanuj kolejnej torby. " + error.message;
    status.className = "trayStatus bad";
    console.error("Błąd zapisu torby:", error);
    sound("bad");
    isClosing = false;
    return false;
  }
}

function clearPackingState() {
  currentBag = null;
  expectedItems = [];
  correctScans = [];
  wrong = [];
  duplicates = [];
  allScans = [];
  startedAt = null;
  isClosing = false;
  resumedSessionId = null;
  resumedFromBraki = false;

  bagInput.value = "";
  trayInput.value = "";
  status.innerText = "";
  status.className = "trayStatus";
  badCloseBtn.disabled = false;
  brakiCloseBtn.disabled = false;

  resumeBanner.classList.add("hidden");
  resumeBanner.innerText = "";
}

function reset() {
  clearPackingState();
  showOnly("bagScreen");
  focusBagInput();
}
</script>
